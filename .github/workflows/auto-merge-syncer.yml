name: Auto Merge for exercism-solutions-syncer

permissions:
  pull-requests: write
  contents: write

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  auto-merge:
    if: contains(github.event.pull_request.user.login, 'exercism-solutions-syncer') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge with retry
        uses: actions/github-script@v6
        with:
          script: |
            const MAX_RETRIES = 10;
            const RETRY_DELAY = 5000; // 5 seconds
            
            async function enableForPullRequest(nodeId, octokit, retryCount = 0) {
              try {
                // 使用 REST API 而不是 GraphQL（更稳定）
                const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
                const prNumber = context.payload.pull_request?.number || 
                                (context.eventName === 'workflow_dispatch' ? null : null);
                
                // 尝试启用 auto-merge
                await octokit.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: parseInt(prNumber),
                  merge_method: 'merge', // 或 'squash', 'rebase'
                  auto_merge: true
                });
                
                console.log(`✅ Auto-merge enabled for PR #${prNumber}`);
                return true;
              } catch (err) {
                if (err.status === 422 && err.message?.includes('unstable')) {
                  if (retryCount < MAX_RETRIES) {
                    console.log(`⚠️ PR is unstable, retrying in ${RETRY_DELAY/1000}s... (Attempt ${retryCount + 1}/${MAX_RETRIES})`);
                    await new Promise(resolve => setTimeout(resolve, RETRY_DELAY));
                    return enableForPullRequest(nodeId, octokit, retryCount + 1);
                  } else {
                    console.error(`❌ Failed to enable auto-merge after ${MAX_RETRIES} attempts`);
                    throw err;
                  }
                }
                throw err;
              }
            }
            
            try {
              if (context.eventName === 'workflow_dispatch') {
                // 手动触发：处理所有 open PR
                const owner = context.repo.owner;
                const repo = context.repo.repo;
                const prs = await github.rest.pulls.list({
                  owner, repo, state: 'open', per_page: 100
                });
                
                for (const pr of prs.data) {
                  if (pr.user && pr.user.login && pr.user.login.includes('exercism-solutions-syncer')) {
                    console.log(`Processing PR #${pr.number} (user: ${pr.user.login})`);
                    try {
                      await enableForPullRequest(pr.node_id, github);
                    } catch (err) {
                      console.error(`Failed for PR #${pr.number}:`, err.message);
                    }
                    // 避免 API 限流
                    await new Promise(resolve => setTimeout(resolve, 1000));
                  }
                }
              } else {
                // PR 事件触发：只处理当前 PR
                const pr = context.payload.pull_request;
                if (!pr) {
                  console.log('No pull_request in context');
                  return;
                }
                
                console.log(`Enabling auto-merge for PR #${pr.number}`);
                await enableForPullRequest(pr.node_id, github);
              }
            } catch (err) {
              console.error('Enable auto-merge failed:', err);
              throw err;
            }
