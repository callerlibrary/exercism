name: Auto Merge for exercism-solutions-syncer

permissions:
  pull-requests: write
  contents: write

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  auto-merge:
    # 仅当 PR 作者是特定账号，或者手动触发时执行
    if: contains(github.event.pull_request.user.login, 'exercism-solutions-syncer') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v6
        with:
          script: |
            // 定义 GraphQL Mutation 语句
            const query = `mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
              enablePullRequestAutoMerge(input: {
                pullRequestId: $pullRequestId,
                mergeMethod: $mergeMethod
              }) {
                pullRequest {
                  number
                  autoMergeRequest {
                    enabledAt
                  }
                }
              }
            }`;

            // 封装开启函数
            async function enableAutoMerge(nodeId, number) {
              try {
                await github.graphql(query, {
                  pullRequestId: nodeId,
                  mergeMethod: 'MERGE' // 可选: 'SQUASH', 'REBASE', 'MERGE'
                });
                console.log(`✅ 已成功为 PR #${number} 开启自动合并 (Auto-merge enabled)`);
              } catch (error) {
                // 如果已经开启过，GitHub 会报错，这里捕获并提示
                if (error.message.includes('Auto merge has already been enabled')) {
                  console.log(`ℹ️ PR #${number} 已经开启过自动合并，无需重复操作。`);
                } else {
                  console.error(`❌ 为 PR #${number} 开启自动合并失败:`, error.message);
                }
              }
            }

            // 逻辑处理
            if (context.eventName === 'workflow_dispatch') {
              // 手动触发：遍历所有符合条件的 Open PRs
              console.log('手动触发：正在检查所有打开的 PR...');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });

              for (const pr of prs) {
                if (pr.user && pr.user.login.includes('exercism-solutions-syncer')) {
                  await enableAutoMerge(pr.node_id, pr.number);
                }
              }
            } else {
              // PR 事件触发：仅处理当前 PR
              const pr = context.payload.pull_request;
              if (pr) {
                await enableAutoMerge(pr.node_id, pr.number);
              } else {
                console.log('未发现 PR 上下文');
              }
            }
